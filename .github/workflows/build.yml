name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

  docker:
    name: Build & Push Images
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chainward-api
            context: .
            dockerfile: apps/api/Dockerfile
          - image: chainward-web
            context: .
            dockerfile: apps/web/Dockerfile
          - image: chainward-indexer
            context: .
            dockerfile: packages/indexer/Dockerfile
          - image: chainward-acp-decoder
            context: .
            dockerfile: apps/acp-decoder/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy is manual for now — K3s is on a private network.
  # After images push, deploy from any machine with kubectl access:
  #   TAG=$(git rev-parse --short HEAD)
  #   kubectl -n chainward set image deployment/api api=ghcr.io/saltxd/chainward-api:$TAG
  #   kubectl -n chainward set image deployment/web web=ghcr.io/saltxd/chainward-web:$TAG
  #   kubectl -n chainward set image deployment/indexer indexer=ghcr.io/saltxd/chainward-indexer:$TAG
