namespace: chainward
domain: chainward.k3s.nox
publicDomain: chainward.ai

images:
  api: ghcr.io/saltxd/chainward-api:latest
  web: ghcr.io/saltxd/chainward-web:latest
  indexer: ghcr.io/saltxd/chainward-indexer:latest

imagePullSecrets:
  - name: ghcr-pull

postgres:
  image: timescale/timescaledb:latest-pg16
  storage: 10Gi
  user: chainward
  database: chainward

redis:
  image: redis:7-alpine
  storage: 1Gi

api:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

indexer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# External secret name (created via kubectl, not managed by Helm)
externalSecret: chainward-secrets
