namespace: chainward
domain: chainward.k3s.nox
publicDomain: chainward.ai

images:
  api: ghcr.io/saltxd/chainward-api:latest
  web: ghcr.io/saltxd/chainward-web:latest
  indexer: ghcr.io/saltxd/chainward-indexer:latest
  acpDecoder: ghcr.io/saltxd/chainward-acp-decoder:latest

imagePullSecrets:
  - name: ghcr-pull

postgres:
  image: timescale/timescaledb:2.25.1-pg16
  storage: 40Gi
  user: chainward
  database: chainward

# Prober CronJob reads its Discord webhook URL from the `chainward-secrets` secret
# under key `PROBER_DISCORD_WEBHOOK`. Create with:
#   kubectl -n chainward patch secret chainward-secrets --type merge \
#     --patch='{"stringData":{"PROBER_DISCORD_WEBHOOK":"<url>"}}'

redis:
  image: redis:7-alpine
  storage: 1Gi

api:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1500m
      memory: 1Gi

web:
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

indexer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

acpDecoder:
  enabled: false  # opt-in; flip after first acp-decoder setup completes
  replicas: 1
  resources:
    # Sized for the claude --print subprocess spawned during report-writing.
    # Claude Code CLI launches its own Node + tooling subprocesses; the
    # previous 512Mi cap was tight enough to OOMKill mid-decode, which means
    # the buyer's USDC is locked while we crash-recover. 1.5 GiB gives
    # headroom for 1-2 concurrent decodes.
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1536Mi
  defaultChainId: 8453  # Base mainnet
  # Public Base RPC. cw-sentinel (our internal node) is intentionally paused
  # for a RAM upgrade; the agent falls through to mainnet.base.org until it
  # comes back. Override via SENTINEL_RPC env var if needed.
  sentinelRpc: https://mainnet.base.org
  # Launch price in USD. MUST match the price of the offering registered on
  # the Virtuals dashboard. Mismatched values either fail the budget call
  # or charge the wrong amount.
  feeUsdc: 10
  # createSecret stays false by default — acp-decoder-secrets is created
  # manually via kubectl (see templates/acp-decoder-secret.yaml header).
  # Set createSecret: true + walletAddress / walletId / walletSignerPrivateKey
  # / claudeOauthToken only with sealed-secrets or external-secrets-operator.
  createSecret: false

# External secret name (created via kubectl, not managed by Helm)
externalSecret: chainward-secrets
