apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainward.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.images.api }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: chainward-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: JWT_SECRET
            - name: ALCHEMY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: ALCHEMY_API_KEY
            - name: BASE_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: BASE_RPC_URL
            - name: BASE_RPC_FALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: BASE_RPC_FALLBACK_URL
                  optional: true
            - name: CHAIN_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: CHAIN_PROVIDER
                  optional: true
            - name: ALCHEMY_WEBHOOK_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: ALCHEMY_WEBHOOK_SIGNING_KEY
                  optional: true
            - name: ALCHEMY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: ALCHEMY_AUTH_TOKEN
                  optional: true
            - name: ALCHEMY_WEBHOOK_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: ALCHEMY_WEBHOOK_ID
                  optional: true
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainward.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: api
