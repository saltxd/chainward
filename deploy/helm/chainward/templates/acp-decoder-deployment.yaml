{{- if .Values.acpDecoder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acp-decoder
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainward.labels" . | nindent 4 }}
    app.kubernetes.io/component: acp-decoder
spec:
  replicas: {{ .Values.acpDecoder.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: acp-decoder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: acp-decoder
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: acp-decoder
          image: {{ .Values.images.acpDecoder }}
          envFrom:
            - configMapRef:
                name: chainward-config
            - secretRef:
                name: acp-decoder-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: REDIS_URL
                  optional: true
            - name: DEFAULT_CHAIN_ID
              value: {{ .Values.acpDecoder.defaultChainId | quote }}
            - name: SENTINEL_RPC
              value: {{ .Values.acpDecoder.sentinelRpc | quote }}
            - name: ACP_FEE_USDC
              value: {{ .Values.acpDecoder.feeUsdc | quote }}
            {{- if .Values.acpDecoder.telemetry.enabled }}
            # OpenTelemetry traces → self-hosted Phoenix only (in-cluster OTLP).
            # NOT Anthropic. Content (prompts/tool I/O) deliberately NOT captured:
            # no OTEL_LOG_USER_PROMPTS / OTEL_LOG_TOOL_CONTENT — those default to redacted.
            - name: CLAUDE_CODE_ENABLE_TELEMETRY
              value: "1"
            - name: CLAUDE_CODE_ENHANCED_TELEMETRY_BETA
              value: "1"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.acpDecoder.telemetry.otlpEndpoint | quote }}
            # Phoenix has auth enabled; OTLP ingestion needs a Bearer system key
            # or it silently 401s every span. Header field MUST be lowercased
            # ("authorization") for gRPC. Key lives in the phoenix-otlp secret.
            - name: PHOENIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.acpDecoder.telemetry.apiKeySecret }}
                  key: PHOENIX_API_KEY
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: "authorization=Bearer $(PHOENIX_API_KEY)"
            {{- end }}
          resources:
            {{- toYaml .Values.acpDecoder.resources | nindent 12 }}
{{- end }}
