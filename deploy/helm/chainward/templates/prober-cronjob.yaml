apiVersion: batch/v1
kind: CronJob
metadata:
  name: chainward-prober
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: chainward
    app.kubernetes.io/component: prober
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 2026-06-02: 120→240 so the in-script DB-readiness retry (≤~120s, see the
      # prober command below) fits alongside normal work inside a single */5
      # window. 240 < 300s schedule and concurrencyPolicy=Forbid prevents overlap.
      activeDeadlineSeconds: 240
      # Kept at 0 deliberately: the in-script DB-readiness gate handles transient
      # postgres blips. A pod-level retry would re-run `apk add` from scratch and
      # risk blowing the deadline; in-script retry is cheaper and more precise.
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: prober
              image: postgres:16-alpine
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: chainward-secrets
                      key: DATABASE_URL
                - name: DISCORD_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: chainward-secrets
                      key: PROBER_DISCORD_WEBHOOK
                - name: STALE_MINUTES_THRESHOLD
                  # 2026-04-19: bumped 15→45 for off-peak cadence (commit 188adc0).
                  # 2026-05-24: 45 still false-fires during Sunday-evening troughs
                  #   (24h tx profile observed: 3-31 tx/hr, multi-hour stretches
                  #    at 3-5/hr → natural 45+ min gaps). Bumped 45→120; catches
                  #    a real outage within ≤2h via 5-min CronJob cadence.
                  value: "120"
                - name: UNDELIVERED_THRESHOLD
                  value: "5"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl >/dev/null 2>&1

                  # Discord colors
                  RED=15105570       # crit
                  AMBER=15158332     # warn (prober malfunction)
                  GREEN=3066993      # resolved

                  # Claude_Dev ping — use Discord user-ID format + allowed_mentions to actually
                  # trigger the mention (plain "@Claude_Dev" is just text and won't notify).
                  CLAUDE_USER_ID="1484392008348074126"
                  CLAUDE_PING="<@${CLAUDE_USER_ID}>"

                  # $1 title  $2 desc  $3 color  $4 content (default = ping)  $5 ping ("true"/"false")
                  #
                  # `content` is what the receiving bot can read via Discord's
                  # fetch_messages (embeds aren't exposed). Always put a short
                  # summary there so on-call triage doesn't require kubectl.
                  #
                  # `ping="false"` suppresses the push-notification by setting
                  # allowed_mentions.parse=[] — used for RESOLVED messages so
                  # they post for audit trail but don't wake anyone up.
                  send_discord() {
                    local title="$1" desc="$2" color="$3"
                    local content="${4:-$CLAUDE_PING}" ping="${5:-true}"
                    local mentions='{"users": ["'"$CLAUDE_USER_ID"'"]}'
                    if [ "$ping" = "false" ]; then
                      mentions='{"parse": []}'
                    fi
                    curl -sf -X POST "$DISCORD_WEBHOOK" \
                      -H "Content-Type: application/json" \
                      -d "{
                        \"content\": \"${content}\",
                        \"allowed_mentions\": ${mentions},
                        \"embeds\": [{
                          \"title\": \"$title\",
                          \"description\": \"$desc\",
                          \"color\": $color,
                          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                        }]
                      }" >/dev/null 2>&1
                  }

                  pq() { psql "$DATABASE_URL" -t -A -c "$1"; }

                  # Stateful alert helper. Transitions only; suppresses repeated fires + sends
                  # a RESOLVED on recovery. FIRED pings the user; RESOLVED is quiet (audit-trail only).
                  #
                  #   $1 = state key (e.g. indexer_stall_alerting)
                  #   $2 = current-condition boolean ("true" or "false")
                  #   $3 = fire title    $4 = fire desc    $5 = fire color    $6 = fire content (one-liner shown in Discord content)
                  #   $7 = resolve title $8 = resolve desc                    $9 = resolve content
                  alert_with_resolve() {
                    local key="$1" firing="$2"
                    local f_title="$3" f_desc="$4" f_color="$5" f_content="$6"
                    local r_title="$7" r_desc="$8" r_content="$9"
                    local prev
                    prev=$(pq "SELECT value FROM prober_state WHERE key = '$key';")
                    if [ "$firing" = "true" ] && [ "$prev" != "true" ]; then
                      send_discord "$f_title" "$f_desc" "$f_color" "$f_content" "true"
                      pq "INSERT INTO prober_state (key, value) VALUES ('$key', 'true')
                          ON CONFLICT (key) DO UPDATE SET value = 'true', updated_at = now();" >/dev/null
                      echo "FIRED: $key"
                    elif [ "$firing" = "false" ] && [ "$prev" = "true" ]; then
                      send_discord "$r_title" "$r_desc" "$GREEN" "$r_content" "false"
                      pq "INSERT INTO prober_state (key, value) VALUES ('$key', 'false')
                          ON CONFLICT (key) DO UPDATE SET value = 'false', updated_at = now();" >/dev/null
                      echo "RESOLVED: $key"
                    fi
                  }

                  # ==============================
                  # DB readiness gate (added 2026-06-02)
                  # ==============================
                  # Tolerate brief postgres unavailability — e.g. a ~60-120s
                  # StatefulSet restart / Longhorn volume re-attach — instead of
                  # crashing the tick. Without this, `set -e` + the first bare
                  # psql below turns a routine DB restart into a pod Error ->
                  # KubeJobFailed page (observed 3x on 2026-06-02, each a
                  # self-healing transient). A *sustained* outage still alerts
                  # loudly via the AMBER path below — and now actually reaches it:
                  # a bare `set -e` crash on connection-refused never did, because
                  # it aborted before the existing non-numeric check could fire.
                  DB_WAIT_ATTEMPTS=8      # x DB_WAIT_INTERVAL ~= up to 120s, inside activeDeadlineSeconds=240
                  DB_WAIT_INTERVAL=15
                  attempt=1
                  until psql "$DATABASE_URL" -tAc 'SELECT 1' >/dev/null 2>&1; do
                    if [ "$attempt" -ge "$DB_WAIT_ATTEMPTS" ]; then
                      waited=$(( DB_WAIT_ATTEMPTS * DB_WAIT_INTERVAL ))
                      if send_discord \
                          "HIGH: Prober DB Unreachable" \
                          "postgres refused connections for ~${waited}s (${DB_WAIT_ATTEMPTS} attempts). DB down or restarting too long — watchdog blind until it recovers." \
                          "$AMBER" \
                          "${CLAUDE_PING} ⚠️ Prober: postgres unreachable after ${DB_WAIT_ATTEMPTS} attempts (~${waited}s) — watchdog blind" \
                          "true"; then
                        echo "prober: DB unreachable after ${DB_WAIT_ATTEMPTS} attempts — AMBER sent, exiting 0 to avoid duplicate KubeJobFailed noise"
                        exit 0
                      fi
                      # Alert delivery itself failed → don't fail silent; let the
                      # job fail so KubeJobFailed fires as a last-resort backstop.
                      echo "prober: DB unreachable AND Discord webhook failed — exiting 1 as backstop"
                      exit 1
                    fi
                    echo "prober: postgres not ready (attempt ${attempt}/${DB_WAIT_ATTEMPTS}), retrying in ${DB_WAIT_INTERVAL}s..."
                    attempt=$(( attempt + 1 ))
                    sleep "$DB_WAIT_INTERVAL"
                  done

                  # ==============================
                  # Check 1: indexer stall
                  # ==============================
                  STALE_MINUTES=$(pq "
                    SELECT COALESCE(
                      EXTRACT(EPOCH FROM (now() - MAX(timestamp))) / 60,
                      -1
                    )::int
                    FROM transactions;
                  ")
                  AGENT_COUNT=$(pq "SELECT COUNT(*) FROM agent_registry;")

                  # Fail-loud: if either query returns non-numeric, send a distinct malfunction alert
                  # instead of silently suppressing the real check. This is the exact bug class that
                  # hid a 25h outage before — never fail silent.
                  if ! echo "$STALE_MINUTES" | grep -qE '^-?[0-9]+$' || ! echo "$AGENT_COUNT" | grep -qE '^[0-9]+$'; then
                    send_discord \
                      "HIGH: Prober Query Failed" \
                      "psql returned non-numeric result. stale=\`${STALE_MINUTES}\` agents=\`${AGENT_COUNT}\`. DB unreachable or schema drift — watchdog is blind." \
                      "$AMBER" \
                      "${CLAUDE_PING} ⚠️ Prober Query Failed: psql non-numeric (stale=${STALE_MINUTES} agents=${AGENT_COUNT}) — watchdog blind" \
                      "true"
                    echo "FIRED: prober query malfunction"
                  else
                    STALL_FIRING="false"
                    if [ "$STALE_MINUTES" -gt "$STALE_MINUTES_THRESHOLD" ] && [ "$AGENT_COUNT" -gt 0 ]; then
                      STALL_FIRING="true"
                    fi
                    alert_with_resolve \
                      "indexer_stall_alerting" \
                      "$STALL_FIRING" \
                      "HIGH: Indexer Stall Detected" \
                      "${CLAUDE_PING} No new transactions indexed in ${STALE_MINUTES} minutes. ${AGENT_COUNT} registered agents. Check Alchemy webhook \`is_active\` and API/indexer pod logs." \
                      "$RED" \
                      "${CLAUDE_PING} 🚨 Indexer Stall: ${STALE_MINUTES}min stale (threshold ${STALE_MINUTES_THRESHOLD}min), ${AGENT_COUNT} agents" \
                      "RESOLVED: Indexer Stall" \
                      "Transactions flowing again. Current stale=${STALE_MINUTES}min (threshold ${STALE_MINUTES_THRESHOLD}min), ${AGENT_COUNT} agents tracked. No action needed." \
                      "✅ Indexer Stall resolved: ${STALE_MINUTES}min stale, ${AGENT_COUNT} agents tracked"
                  fi

                  # ==============================
                  # Check 2: alert delivery failures
                  # ==============================
                  UNDELIVERED=$(pq "
                    SELECT COUNT(*)
                    FROM alert_events
                    WHERE delivered = false
                      AND timestamp > now() - interval '1 hour';
                  ")

                  if ! echo "$UNDELIVERED" | grep -qE '^[0-9]+$'; then
                    send_discord \
                      "HIGH: Prober Query Failed" \
                      "alert_events query returned non-numeric result: \`${UNDELIVERED}\`." \
                      "$AMBER" \
                      "${CLAUDE_PING} ⚠️ Prober Query Failed (alert_events): non-numeric undelivered=${UNDELIVERED}" \
                      "true"
                  else
                    DELIV_FIRING="false"
                    if [ "$UNDELIVERED" -gt "$UNDELIVERED_THRESHOLD" ]; then
                      DELIV_FIRING="true"
                    fi
                    alert_with_resolve \
                      "delivery_alerting" \
                      "$DELIV_FIRING" \
                      "HIGH: Alert Delivery Failures" \
                      "${CLAUDE_PING} ${UNDELIVERED} undelivered alerts in the last hour. Check alert-deliver worker + notification channels." \
                      "$RED" \
                      "${CLAUDE_PING} 🚨 Alert Delivery: ${UNDELIVERED} undelivered in 1h (threshold ${UNDELIVERED_THRESHOLD})" \
                      "RESOLVED: Alert Delivery" \
                      "Alert delivery recovered. Last hour undelivered=${UNDELIVERED} (threshold ${UNDELIVERED_THRESHOLD})." \
                      "✅ Alert Delivery resolved: ${UNDELIVERED} undelivered in last hour"
                  fi

                  echo "prober tick complete. stale=${STALE_MINUTES}min agents=${AGENT_COUNT} undelivered=${UNDELIVERED}"
