{{- if .Values.backup.nfsServer }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainward.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  # 03:30 MDT (09:30 UTC). Staggered away from other cluster backup jobs.
  schedule: "30 9 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              # pg16 client matches the TimescaleDB server (timescale/timescaledb:2.25.1-pg16).
              # Plain pg_dump handles TimescaleDB hypertables natively in 2.x — restore target
              # just needs the timescaledb extension installed.
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -u
                  BACKUP_DIR=/backups/{{ .Values.namespace }}
                  mkdir -p "$BACKUP_DIR"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="$BACKUP_DIR/{{ .Values.postgres.database }}-${TIMESTAMP}.sql.gz"
                  STATUS_FILE=/tmp/pg_dump.status

                  # pg_dump's status must be captured explicitly. `pg_dump | gzip > f`
                  # followed by `[ $? -eq 0 ]` tests *gzip*, which succeeds even when
                  # pg_dump wrote nothing — so a dead pg_dump reads as success. That
                  # masked 16 days of 20-byte dumps in the netbox namespace (found
                  # 2026-07-24) while the job reported success and pruned real history.
                  { pg_dump -h postgres -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }}; echo $? > "$STATUS_FILE"; } \
                    | gzip > "$FILENAME"
                  DUMP_STATUS=$(cat "$STATUS_FILE")

                  if [ "$DUMP_STATUS" -ne 0 ]; then
                    echo "Backup FAILED: pg_dump exited $DUMP_STATUS"
                    rm -f "$FILENAME"
                    exit 1
                  fi

                  # A successful-looking but tiny artifact is still a failure.
                  # gzip of an empty stream is exactly 20 bytes.
                  SIZE=$(wc -c < "$FILENAME")
                  if [ "$SIZE" -lt 1000 ]; then
                    echo "Backup FAILED: $FILENAME is only $SIZE bytes"
                    rm -f "$FILENAME"
                    exit 1
                  fi

                  echo "Backup successful: $FILENAME ($SIZE bytes)"

                  # Prune only after a verified-good backup. Pruning unconditionally
                  # turns a stalled backup into active data destruction.
                  find "$BACKUP_DIR" -name "*.sql.gz" -mtime +14 -delete
                  echo "Cleaned up backups >14d"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.externalSecret }}
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-storage
              # NFS target comes from a private values overlay (see values.yaml `backup:`).
              nfs:
                server: {{ .Values.backup.nfsServer }}
                path: {{ .Values.backup.nfsPath }}
{{- end }}
