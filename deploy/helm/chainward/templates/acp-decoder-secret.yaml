{{/*
acp-decoder-secrets is normally created manually via kubectl to keep sensitive
values out of git. Use createSecret: true only in environments where you are
already managing values securely (e.g., sealed secrets, external secrets operator).

Manual creation (ACP v2):
  kubectl -n chainward create secret generic acp-decoder-secrets \
    --from-literal=WALLET_ADDRESS=<0x...> \
    --from-literal=WALLET_ID=<privy wallet id> \
    --from-literal=WALLET_SIGNER_PRIVATE_KEY=<P256 PEM> \
    --from-literal=CLAUDE_CODE_OAUTH_TOKEN=<token>
*/}}
{{- if and .Values.acpDecoder.enabled .Values.acpDecoder.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: acp-decoder-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chainward.labels" . | nindent 4 }}
    app.kubernetes.io/component: acp-decoder
type: Opaque
stringData:
  WALLET_ADDRESS: {{ required "acpDecoder.walletAddress is required when createSecret is true" .Values.acpDecoder.walletAddress | quote }}
  WALLET_ID: {{ required "acpDecoder.walletId is required when createSecret is true" .Values.acpDecoder.walletId | quote }}
  WALLET_SIGNER_PRIVATE_KEY: {{ required "acpDecoder.walletSignerPrivateKey is required when createSecret is true" .Values.acpDecoder.walletSignerPrivateKey | quote }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ required "acpDecoder.claudeOauthToken is required when createSecret is true" .Values.acpDecoder.claudeOauthToken | quote }}
{{- end }}
