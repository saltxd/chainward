{{/*
This is a placeholder to document the required secret structure.
The actual secret is created manually via kubectl to keep sensitive values out of git:

kubectl -n chainward create secret generic chainward-secrets \
  --from-literal=JWT_SECRET=<random-32-char-string> \
  --from-literal=ALCHEMY_API_KEY=<alchemy-key> \
  --from-literal=POSTGRES_PASSWORD=<strong-password> \
  --from-literal=DATABASE_URL=postgresql://chainward:<password>@postgres:5432/chainward \
  --from-literal=BASE_RPC_URL=http://192.168.1.194:8545 \
  --from-literal=BASE_RPC_FALLBACK_URL=https://base-mainnet.g.alchemy.com/v2/<alchemy-key> \
  --from-literal=TELEGRAM_BOT_TOKEN=<bot-token-from-botfather> \
  --from-literal=DIGEST_DISCORD_WEBHOOK=<discord-webhook-url>
*/}}
