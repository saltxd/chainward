apiVersion: v1
kind: ConfigMap
metadata:
  name: agentguard-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "{{ .Values.api.port }}"
  REDIS_URL: "redis://redis:6379"
  BETTER_AUTH_URL: "http://{{ .Values.domain }}"
  CORS_ORIGINS: "http://{{ .Values.domain }}"
  API_INTERNAL_URL: "http://api:{{ .Values.api.port }}"
