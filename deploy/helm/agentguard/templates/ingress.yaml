apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agentguard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api
          port: {{ .Values.api.port }}
    - match: Host(`{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: web
          port: {{ .Values.web.port }}
