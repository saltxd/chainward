{{/*
This is a placeholder to document the required secret structure.
The actual secret is created manually via kubectl to keep sensitive values out of git:

kubectl -n agentguard create secret generic agentguard-secrets \
  --from-literal=BETTER_AUTH_SECRET=<random-32-char-string> \
  --from-literal=ALCHEMY_API_KEY=<alchemy-key> \
  --from-literal=POSTGRES_PASSWORD=<strong-password> \
  --from-literal=DATABASE_URL=postgresql://agentguard:<password>@postgres:5432/agentguard \
  --from-literal=BASE_RPC_URL=https://base-mainnet.g.alchemy.com/v2/<alchemy-key>
*/}}
