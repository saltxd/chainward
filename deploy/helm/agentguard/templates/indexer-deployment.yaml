apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
spec:
  replicas: {{ .Values.indexer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: indexer
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: indexer
          image: {{ .Values.images.indexer }}
          envFrom:
            - configMapRef:
                name: agentguard-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: DATABASE_URL
            - name: ALCHEMY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: ALCHEMY_API_KEY
            - name: BASE_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: BASE_RPC_URL
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
