namespace: agentguard
domain: agentguard.k3s.nox

images:
  api: ghcr.io/saltxd/agentguard-api:latest
  web: ghcr.io/saltxd/agentguard-web:latest
  indexer: ghcr.io/saltxd/agentguard-indexer:latest

imagePullSecrets:
  - name: ghcr-pull

postgres:
  image: timescale/timescaledb:latest-pg16
  storage: 10Gi
  user: agentguard
  database: agentguard

redis:
  image: redis:7-alpine
  storage: 1Gi

api:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

indexer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# External secret name (created via kubectl, not managed by Helm)
externalSecret: agentguard-secrets
