services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chainward
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: chainward
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainward"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://chainward:localdev@postgres:5432/chainward
      REDIS_URL: redis://redis:6379

  worker:
    build:
      context: ..
      dockerfile: packages/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://chainward:localdev@postgres:5432/chainward
      REDIS_URL: redis://redis:6379

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000

volumes:
  pgdata:
  redisdata:
